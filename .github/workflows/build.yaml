name: Build Application

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # Define your OS and a friendly name for the files
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup Flutter
      uses: flutter-actions/setup-flutter@v4
      with:
        channel: stable
        version: 3.0.2

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name : Install Chardet on Macos
      if: matrix.os == 'macos'
      run: pip instaall "chardet<7"

    # Custom Instructions per OS
    - name: Build App
      run: |
        flet build ${{ matrix.os }} --no-rich-output --yes

    # Use a generic zip command or 'if' for os-specific zipping
    - name: Zip Windows
      if: matrix.os == 'windows'
      run: Compress-Archive -Path build/windows/* -DestinationPath app-windows.zip
      shell: pwsh

    - name: Zip Linux/Mac
      if: matrix.os != 'windows'
      run: zip -r app-${{ matrix.os }}.zip build/${{ matrix.os }}/*

    # This "saves" the file so the next job can see it
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: app-${{ matrix.os }}.zip

  release:
    needs: build # Wait for all builds to finish
    runs-on: ubuntu-latest
    steps:
      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Create and Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: app-*.zip # Grabs all zip files found
          file_glob: true
          tag: v1.0.${{ github.run_number }}
          overwrite: true
          body: |
            Changes:
            - Multi-Platform support (Windows, Linux, macOS)
            - Bug Fixes
